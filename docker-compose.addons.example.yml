services:
  openclaw-addons-example:
    image: ${OPENCLAW_ADDONS_IMAGE:-openclaw-runtime-addons:local}
    build:
      context: ${OPENCLAW_OPS_DIR:-.}
      dockerfile: ${OPENCLAW_ADDONS_DOCKERFILE:-./Dockerfile.addons}
      args:
        OPENCLAW_BASE_IMAGE: ${OPENCLAW_RUNTIME_IMAGE:-openclaw-runtime:local}
    working_dir: /app
    environment:
      HOME: /home/appuser
      OPENCLAW_REPO_DIR: /app
      OPENCLAW_CONFIG_DIR: /home/appuser/.openclaw
      OPENCLAW_WORKSPACE_DIR: /workspace
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-local-dev-token}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_ADDONS_GATEWAY_PORT:-18790}
      OPENCLAW_CONTROL_UI_ALLOW_INSECURE_AUTH: ${OPENCLAW_CONTROL_UI_ALLOW_INSECURE_AUTH:-1}
      OPENCLAW_DEFAULT_MODEL: ${OPENCLAW_DEFAULT_MODEL:-github-copilot/claude-haiku-4.5}
      OPENCLAW_DEFAULT_PROFILE_ID: ${OPENCLAW_DEFAULT_PROFILE_ID:-github-copilot:github}
      OPENCLAW_BOOTSTRAP_AGENTS_FILE: ${OPENCLAW_BOOTSTRAP_AGENTS_FILE:-0}
      EXAMPLE_ADDON_STATE_DIR: /workspace/addons-example/state
      EXAMPLE_ADDON_INTERVAL_SEC: ${EXAMPLE_ADDON_INTERVAL_SEC:-15}
    volumes:
      - ${OPENCLAW_ADDONS_CONFIG_HOST_DIR:-./build-context/local-test/addons-example/.openclaw}:/home/appuser/.openclaw
      - ${OPENCLAW_ADDONS_WORKSPACE_HOST_DIR:-./build-context/local-test/addons-example/workspace}:/workspace
    ports:
      - "${OPENCLAW_ADDONS_GATEWAY_PORT:-18790}:${OPENCLAW_ADDONS_GATEWAY_PORT:-18790}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${OPENCLAW_ADDONS_GATEWAY_PORT:-18790}/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped
