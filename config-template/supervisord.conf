[unix_http_server]
file=/home/appuser/.cache/supervisor/supervisor.sock
chmod=0700
chown=appuser:appuser

[supervisord]
user=root
nodaemon=true
logfile=/home/appuser/.cache/supervisor/supervisord.log
logfile_maxbytes=0
pidfile=/home/appuser/.cache/supervisor/supervisord.pid
childlogdir=/home/appuser/.cache/supervisor

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///home/appuser/.cache/supervisor/supervisor.sock

[program:openclaw-gateway]
command=/ops/scripts/run-openclaw-gateway.sh
directory=/app
user=appuser
autostart=true
autorestart=true
startsecs=5
priority=10
stopsignal=TERM
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:maintainer-loop]
command=/ops/scripts/run-maintainer-loop.sh
directory=/app
user=appuser
autostart=true
autorestart=true
startsecs=3
priority=20
stopsignal=TERM
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:obsidian-sync]
command=/ops/scripts/run-obsidian-sync.sh
directory=/home/appuser
user=appuser
